name: Build PHP for Android with Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PHP_VERSION: 8.4.2
      SQLITE3_VERSION: 3470200

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v3

      # 2. Prepare output folders
      - name: Prepare output folders
        run: |
          mkdir -p php-binaries/armeabi-v7a
          mkdir -p php-binaries/arm64-v8a

      # 3. Build Docker image for buildsystem stage only
      - name: Build Docker image (buildsystem stage)
        run: |
          docker build \
            --target buildsystem \
            -t php-android-builder .

      # 4. Copy armeabi-v7a binaries
      - name: Extract armeabi-v7a binaries
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/php-binaries/armeabi-v7a:/output \
            -e TARGET=armv7a-linux-androideabi32 \
            php-android-builder \
            sh -c "cp -r /root/install/* /output/"

      # 5. Copy arm64-v8a binaries
      - name: Extract arm64-v8a binaries
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/php-binaries/arm64-v8a:/output \
            -e TARGET=aarch64-linux-android \
            php-android-builder \
            sh -c "cp -r /root/install/* /output/"

      # 6. Upload binaries as separate artifact
      - name: Upload PHP binaries
        uses: actions/upload-artifact@v4
        with:
          name: php-android-binaries
          path: php-binaries/**
