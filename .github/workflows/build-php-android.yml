name: Build PHP for Android with Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PHP_VERSION: 8.4.2
      SQLITE3_VERSION: 3470200

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v3

      # 2. Prepare output folders
      - name: Prepare output folders
        run: |
          mkdir -p php-binaries/armeabi-v7a
          mkdir -p php-binaries/arm64-v8a

      # 3. Build and extract armeabi-v7a
      - name: Build armeabi-v7a
        run: |
          docker build \
            --build-arg TARGET=armv7a-linux-androideabi32 \
            --build-arg LIBDIR=armeabi-v7a \
            -t php-android-builder-armeabi-v7a .
          
          docker run --rm \
            -v ${{ github.workspace }}/php-binaries/armeabi-v7a:/output \
            php-android-builder-armeabi-v7a \
            sh -c "cp -r /root/install/* /output/"

      # 4. Build and extract arm64-v8a
      - name: Build arm64-v8a
        run: |
          docker build \
            --build-arg TARGET=aarch64-linux-android \
            --build-arg LIBDIR=arm64-v8a \
            -t php-android-builder-arm64-v8a .
          
          docker run --rm \
            -v ${{ github.workspace }}/php-binaries/arm64-v8a:/output \
            php-android-builder-arm64-v8a \
            sh -c "cp -r /root/install/* /output/"

      # 5. Upload binaries as artifact
      - name: Upload PHP binaries
        uses: actions/upload-artifact@v4
        with:
          name: php-android-binaries
          path: php-binaries/**
