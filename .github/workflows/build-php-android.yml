name: Build PHP for Android with Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v3

      # 2. Build Docker image from your Dockerfile
      - name: Build Docker image
        run: |
          docker build -t php-android-builder .

      # 3. Run Docker container and copy out built binaries
      - name: Extract built binaries
        run: |
          mkdir -p php-binaries/armeabi-v7a
          mkdir -p php-binaries/arm64-v8a
          # Run container and copy files to mounted folder
          docker run --rm \
            -v ${{ github.workspace }}/php-binaries:/output \
            php-android-builder \
            sh -c "cp -r /root/install/* /output/"

      # 4. Upload binaries as artifacts using v4
      - name: Upload PHP binaries
        uses: actions/upload-artifact@v4
        with:
          name: php-android-binaries
          path: php-binaries/**
