name: Build and Release NDK Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '**.patch'
      - '.github/workflows/**'

jobs:
  build_and_package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        architecture:
          - abi: "arm64-v8a"
            target: "aarch64-linux-android"
            api: "28"
          - abi: "armeabi-v7a"
            target: "armv7a-linux-androideabi"
            api: "28"
          - abi: "x86_64"
            target: "x86_64-linux-android"
            api: "28"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build \
            --tag php-ndk-builder:${{ matrix.architecture.abi }} \
            --build-arg TARGET="${{ matrix.architecture.target }}" \
            --build-arg API="${{ matrix.architecture.api }}" .

      - name: Extract Artifacts
        run: |
          mkdir -p release-package/binaries/${{ matrix.architecture.abi }}
          mkdir -p release-package/headers/php

          CONTAINER_ID=$(docker create php-ndk-builder:${{ matrix.architecture.abi }})

          # Copy from /artifacts (Dockerfile final stage puts everything there)
          docker cp $CONTAINER_ID:/artifacts/. ./release-package/binaries/${{ matrix.architecture.abi }}/
          
          # Copy headers
          docker cp $CONTAINER_ID:/artifacts/headers/php/. ./release-package/headers/php/

          docker rm $CONTAINER_ID

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: php-ndk-artifacts-${{ matrix.architecture.abi }}
          path: release-package/**
          if-no-files-found: error

  release:
    needs: build_and_package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Prepare Final Release Structure
        run: |
          mkdir -p php-ndk-artifacts/lib
          mkdir -p php-ndk-artifacts/include/php

          # Copy libraries for each architecture into separate subdirs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p php-ndk-artifacts/lib/$abi
            if [ -d "downloaded-artifacts/php-ndk-artifacts-$abi/binaries/$abi" ]; then
              cp downloaded-artifacts/php-ndk-artifacts-$abi/binaries/$abi/*.so php-ndk-artifacts/lib/$abi/
            fi
          done

          # Copy PHP headers (same for all arches, pick one)
          if [ -d "downloaded-artifacts/php-ndk-artifacts-arm64-v8a/headers/php" ]; then
            cp -r downloaded-artifacts/php-ndk-artifacts-arm64-v8a/headers/php/. php-ndk-artifacts/include/php/
          fi

      - name: Verify Final Artifacts
        run: |
          echo "=== Final structure ==="
          tree php-ndk-artifacts || ls -laR php-ndk-artifacts
          echo "=== Shared libraries ==="
          find php-ndk-artifacts/lib -name "*.so"
          echo "=== PHP headers ==="
          find php-ndk-artifacts/include -name "*.h" | head -10

      - name: Create ZIP Release Asset
        run: zip -r php-ndk-artifacts.zip php-ndk-artifacts/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: php-ndk-artifacts.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_individual_arches:
    needs: build_and_package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        architecture:
          - abi: "arm64-v8a"
          - abi: "armeabi-v7a"
          - abi: "x86_64"

    steps:
      - name: Download Architecture Artifact
        uses: actions/download-artifact@v4
        with:
          name: php-ndk-artifacts-${{ matrix.architecture.abi }}
          path: downloaded-${{ matrix.architecture.abi }}

      - name: Create Per-Arch ZIP
        run: |
          zip -r php-ndk-${{ matrix.architecture.abi }}.zip downloaded-${{ matrix.architecture.abi }}/

      - name: Upload Per-Arch Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: php-ndk-${{ matrix.architecture.abi }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
